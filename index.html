<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quinn Pixel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1c1c2e);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      color: #d1d1d1;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: white;
      color: black;
      padding: 12px 22px;
      border-radius: 10px;
      font-weight: bold;
      margin: 8px;
    }

    .btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Quinn Pixel 🚀</h1>
    <p>Welcome to my first live website. This is the beginning of my AI and coding journey.</p>
    <a class="btn" href="https://github.com/Quinn-pixel" target="_blank">My GitHub</a>
    <a class="btn" href="#" target="_blank">My Next Project</a>
  </div>
</body>
</html>
